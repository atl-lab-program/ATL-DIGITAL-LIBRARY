<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Gloock&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to bottom, rgb(250, 217, 191), rgb(166, 253, 163), rgb(164, 253, 249));
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0px;

        }

        .header-container {
            width: auto;
            height: auto;
            background-color: rgba(255, 217, 2, 0.479);
            display: flex;
            justify-content: space-between;
            padding: 11px;
            border: 5px solid rgb(230, 195, 1);
            border-radius: 0px 0px 30px 30px;
        }

        .header-image1,
        .header-image2 {
            width: 120px;
            height: 130px;
            border-radius: 20px;
        }

        .text {
            font-family: "Gloock", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        .register {
            background-color: transparent;
            max-width: 100%;
            height: 50px;
            padding: 0 25px;
            font-size: 20px;
            color: rgb(247, 247, 248);
            cursor: pointer;
            border-radius: 8px;
            border: none;


        }

        .button-styling {
            display: flex;
            justify-content: space-between;

            background-color: rgb(54, 52, 131);


        }
    </style>

</head>

<body>

    <div class="header-container">
        <img src="/assets/images/Bkhamct.png" class="header-image1">

        <img src="/assets/images/Rajhans_Logo.jpg" class="header-image2">
    </div>
    <hr>
    <div class="blurred-linear-bg">

        <div class="button-styling">
            <a href="sections/auth/registration.html">
                <button class="register"> Register </button>
            </a>
            <a href="sections/auth/index.html">
                <button class="register">Login</button>
            </a>
            <a href="library.html">
                <button class="register"> Library</button>
            </a>
            <a href="/About-Us.html">
                <button class="register">About Us</button>
            </a>
        </div>
        <hr>
        <br>
        <br>
    </div>



</body>

</html>
