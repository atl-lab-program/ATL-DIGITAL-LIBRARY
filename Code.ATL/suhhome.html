<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Atl Library</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
          background: #ddb7eb;
          background: linear-gradient(1deg, rgba(221, 183, 235, 1) 0%, rgba(255, 227, 227, 1) 100%);
           width: 100%;
           min-height: 100vh;
           margin: 0;
        }

        .split-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%; 
            padding: 20px 40px;                               
        }
        
        .split-container img {
            max-width: 90px; 
            height: auto;
        }

        header {
            font-family: "Lobster Two", sans-serif;
            text-align: center;
            font-size: 80px;
            flex-grow: 1;
        }

        .button-panel {
            display: flex;
            justify-content: center;
            gap: 550px;
            background-color: rgb(248, 224, 224);
            padding: 15px 0;
            width: 100%;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .content-wrapper {
            display: flex;
            flex-direction: column; 
            align-items: center;    
            justify-content: center;
            text-align: center;
            width: 100%;
            gap: 20px;              
            margin-top: 30px;
        }

        .intro-text {
            font-family: Arial, sans-serif;
            font-size: 18px;
            color: #333;
            max-width: 600px; 
            line-height: 1.6;
        }

        .library-link {
            text-decoration: none;
            color: #5c0202;
        }

        .button-style {
            background-color: rgb(255, 239, 239) ;
            max-width: 100%;
            color: #4A1521;
            height: 50px;
            padding: 0 25px;       
            font-size: 15px;       
            cursor: pointer;       
            border-radius: 8px;
            border: none;      
            transition: background-color 0.2s ease;
        }

        .button-style:hover {
            background-color: #0056b3; 
        }
    </style>
</head>
<body>

    <div class="split-container">
        <img src="C:\Users\ATAL 01\Documents\Code.ATL\Rajhans_Logo.jpg" alt="Logo 1">
        <header>Atl Library</header>
        <img src="C:\Users\ATAL 01\Documents\Code.ATL\Bkhamct.png" alt="Logo 2">
    </div>

    <div class="button-panel">
        <a href="C:\Users\ATAL 01\Documents\Code.ATL\doc5.html">
            <button class="button-style">Register</button> 
        </a> 
        
        <a href="C:\Users\ATAL 01\Documents\Code.ATL\doc2.html">
            <button class="button-style">About Us</button>
        </a>

        <a href="C:\Users\ATAL 01\Documents\Code.ATL\doc6.html">
            <button class="button-style">Login</button>
        </a>
    </div>

    <div class="content-wrapper">
        <p class="intro-text">
            This is the ATL Library!<br>
            You can find books, save them, and bookmark them for yourself!<br>
            This is just a small model of our library!<br>
            <strong>- Suhaira, Siddharth and Aadi</strong>
        </p>
        
        <a href="c:\Users\ATAL 01\Documents\Code.ATL\doc3.html" class="library-link">
            <h2>Book Library</h2>
        </a>
    </div>

</body>
</html>
