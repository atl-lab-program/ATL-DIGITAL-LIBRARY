<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #a5c4f3;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background-color: #e0cff3;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            text-align: center;
            color: #333333;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #555555;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #fddddd;
            border-radius: 4px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #ffffff;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            border-color: #007bff;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .password-wrapper input[type="password"],
        .password-wrapper input[type="text"] {
            padding-right: 60px;
        }

        .toggle-btn {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            font-size: 13px;
            font-weight: bold;
            color: #007bff;
            padding: 8px 10px;
            transition: color 0.2s;
        }

        .toggle-btn:hover {
            color: #0056b3;
        }

        button[type="submit"] {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button[type="submit"]:hover {
            background-color: #0056b3;
        }

        p {
            text-align: center;
            margin-top: 15px;
        }

        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

         .home {
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .btn {
            background-color: rgb(41, 145, 0);
            color: white;
            border: none;
            height: 35px;
            width: 150px;
            border-radius: 5px;
            transition: background-color 0.9s ease, transform 0.9s ease;
        }

        .btn:hover {
            background-color: rgb(22, 77, 0);

        }
    </style>
</head>

<body>

    <div class="form-container">
        <h1>Login</h1>

        <form id="loginForm">
            <div class="form-group">
                <label for="full-name">Full Name</label>
                <input type="text" id="full-name" placeholder="Full Name" required>
            </div>

            <div class="form-group">
                <label for="grade">Grade</label>
                <select id="grade" required>
                    <option value="">Select Grade</option>
                    <option>Grade 5</option>
                    <option>Grade 6</option>
                    <option>Grade 7</option>
                    <option>Grade 8</option>
                    <option>Grade 9</option>
                    <option>Grade 10</option>
                </select>
            </div>

            <div class="form-group">
                <label for="passwordField">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="passwordField" placeholder="Enter password" required>
                    <button type="button" class="toggle-btn" id="toggleBtn" onclick="togglePassword()">Show</button>
                </div>
            </div>

            <button type="submit">Login</button>

            <br>
            <hr>
            <p>New User? .. <span><a href="/sections/auth/registration.html">Create Account</a></span></p>
             <br>
    <div class="home">
        <a href="/index.html" class="btn-a">
            <button class="btn"> Back to Home </button>
        </a>
        </div>
        </form>
    </div>
    <script>
        function togglePassword() {
            const passwordField = document.getElementById("passwordField");
            const toggleBtn = document.getElementById("toggleBtn");

            if (passwordField.type === "password") {
                passwordField.type = "text";
                toggleBtn.textContent = "Hide";
            } else {
                passwordField.type = "password";
                toggleBtn.textContent = "Show";
            }
        }

        // Login Authentication Logic
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from reloading page immediately

            const enteredName = document.getElementById('full-name').value.trim();
            const enteredGrade = document.getElementById('grade').value;
            const enteredPassword = document.getElementById('passwordField').value;

            // Retrieve registered user data from LocalStorage
            const storedUserDataRaw = localStorage.getItem('atl_registered_user');

            if (!storedUserDataRaw) {
                alert("No account found! Please register first.");
                return;
            }

            const storedUser = JSON.parse(storedUserDataRaw);

            // Compare details (case-insensitive check for name)
            const isNameValid = storedUser.fullName.trim().toLowerCase() === enteredName.toLowerCase();
            const isGradeValid = storedUser.grade === enteredGrade;
            const isPasswordValid = storedUser.password === enteredPassword;

            if (isNameValid && isGradeValid && isPasswordValid) {
                alert("Login successful! Welcome back, " + storedUser.fullName);
                
                // Set session flag
                localStorage.setItem('isLoggedIn', 'true');

                // Redirect to root index.html
                window.location.href = "/index.html";
            } else {
                alert("Invalid Credentials! Please check your name, grade, and password.");
            }
        });
    </script>

</body>

</html>
