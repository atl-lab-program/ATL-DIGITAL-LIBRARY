<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #a5c4f3;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background-color: #e0cff3;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            text-align: center;
            color: #333333;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #555555;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #fddddd;
            border-radius: 4px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #ffffff;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="password"]:focus,
        select:focus {
            border-color: #007bff;
        }

        .radio-options {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 2px;
        }

        .radio-options label {
            font-weight: normal;
            margin-bottom: 0;
            cursor: pointer;
        }

        input[type="radio"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input[type="password"],
        .password-wrapper input[type="text"] {
            padding-right: 60px;
        }

        .toggle-btn {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            font-size: 13px;
            font-weight: bold;
            color: #007bff;
            padding: 8px 10px;
            transition: color 0.2s;
        }

        .toggle-btn:hover {
            color: #0056b3;
        }

        button[type="submit"] {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button[type="submit"]:hover {
            background-color: #0056b3;
        }
        
         .home {
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .btn {
            background-color: rgb(41, 145, 0);
            color: white;
            border: none;
            height: 35px;
            width: 150px;
            border-radius: 5px;
            transition: background-color 0.9s ease, transform 0.9s ease;
        }

        .btn:hover {
            background-color: rgb(22, 77, 0);

        }
    </style>
</head>

<body>

    <div class="form-container">
        <h1>Registration Form</h1>

        <form id="bored">
            <div class="form-group">
                <label for="full-name">Full Name</label>
                <input type="text" id="full-name" placeholder="Full Name" required>
            </div>

            <div class="form-group">
                <label for="phone">Parent Phone No. </label>
                <input type="text" id="phone" placeholder="Please enter exactly ten numbers" required inputmode="numeric" pattern="[0-9]{10}" minlegnth="10" maxlength="10">
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" required>
            </div>

            <div class="form-group">
                <label for="confirm-phone">Confirm Phone No.</label>
                <input type="text" id="confirm-phone" placeholder="+ 91" required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="radio-options">
                    <label><input type="radio" name="gender" value="male" required> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                </div>
            </div>

            <div class="form-group">
                <label for="grade">Grade</label>
                <select id="grade" required>
                    <option value="">Select Grade</option>
                    <option>Grade 5</option>
                    <option>Grade 6</option>
                    <option>Grade 7</option>
                    <option>Grade 8</option>
                    <option>Grade 9</option>
                    <option>Grade 10</option>
                </select>
            </div>

            <div class="form-group">
                <label for="passwordField">Create Password</label>
                <div class="password-wrapper">
                    <input type="password" id="passwordField" placeholder="Enter password" required>
                    <button type="button" class="toggle-btn" id="toggleBtn1"
                        onclick="togglePassword('passwordField','toggleBtn1')">Show</button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPasswordField">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPasswordField" placeholder="Confirm password" required>
                    <button type="button" class="toggle-btn" id="toggleBtn2"
                        onclick="togglePassword('confirmPasswordField','toggleBtn2')">Show</button>
                </div>
            </div>

            <button type="submit">Submit Registration</button>

            <br>
            <hr>
            <p>Already Have An Account? .. <span><a href="/sections/auth/index.html">Go To Login</a></span>
            </p>

            <div class="home">
        <a href="/index.html" class="btn-a">
            <button class="btn" type="button"> Back to Home </button>
        </a>
        </div>
        </form>
    </div>

    <script>
        function togglePassword(fieldId, btnId) {
            const passwordField = document.getElementById(fieldId);
            const toggleBtn = document.getElementById(btnId);

            if (passwordField.type === "password") {
                passwordField.type = "text";
                toggleBtn.textContent = "Hide";
            } else {
                passwordField.type = "password";
                toggleBtn.textContent = "Show";
            }
        }

        const form = document.getElementById('bored');
        const password = document.getElementById('passwordField');
        const confirmPassword = document.getElementById('confirmPasswordField');
        const phone = document.getElementById('phone');
        const confirmPhone = document.getElementById('confirm-phone');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop default navigation so validation runs

            // 1. Validation Checks
            if (phone.value !== confirmPhone.value) {
                alert("Phone numbers do not match! Please try again.");
                return;
            }

            if (password.value !== confirmPassword.value) {
                alert("Passwords do not match! Please try again.");
                return;
            }

            // 2. Gather User Data
            const selectedGender = document.querySelector('input[name="gender"]:checked')?.value || '';
            
            const userData = {
                fullName: document.getElementById('full-name').value,
                phone: phone.value,
                dob: document.getElementById('dob').value,
                gender: selectedGender,
                grade: document.getElementById('grade').value,
                password: password.value
            };

            // 3. Save to Browser Storage
            localStorage.setItem('atl_registered_user', JSON.stringify(userData));

            alert("Registration successful! Your data is saved locally.");

            // 4. Redirect to login page
            window.location.href = "/sections/auth/index.html";
        });
    </script>

</body>

</html>
